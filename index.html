<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Хобби</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <h1>Денис / Танки</h1>
    <button class="burger" id="burger-btn" aria-label="Открыть меню">
    ☰
    </button>
    <nav>
        <a href="#about">Обо мне</a>
        <a href="#projects">Проекты</a>
        <a href="#contact">Контакты</a>
    </nav>
    <button id="theme-toggle" aria-label="Переключить тему">🌙</button>

    </header>

    <main>
        <section id="about">
            <h2>О себе</h2>
            <p>Танкист со стажем более 13 лет</p>
            <div class="extra-info" id="extra-info">
            <p>Дополнительный текст о себе, который раскрывается по клику...</p>
            </div>
            <button id="toggle-btn">Показать больше</button>
        </section>

        <section id="contact">
            <h2>Связаться со мной</h2>
            <form id="contact-form">
                <label for="name">Имя</label>
                <input type="text" id="name" name="name">
                <span class="error" id="name-error"></span>

                <label for="email">Email</label>
                <input type="text" id="email" name="email">
                <span class="error" id="email-error"></span>

                <button type="submit">Отправить</button>
            </form>
        </section>
        <div class="filters">
            <button data-filter="all" class="active">Все</button>
            <button data-filter="frontend">Frontend</button>
            <button data-filter="design">Дизайн</button>
        </div>

        <input type="text" id="search-input" placeholder="Поиск проекта...">
        
        <section id="projects">
            <h2>Проекты</h2>
            <div class="projects-grid" id="projects-grid"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Напылов Денис. Обновлено: <span id="update-date"></span></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
